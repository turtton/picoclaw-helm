apiVersion: v1
kind: Service
metadata:
  name: {{ include "picoclaw.fullname" . }}
  labels:
    {{- include "picoclaw.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
    {{- if .Values.launcher.enabled }}
    - port: {{ .Values.launcher.port }}
      targetPort: launcher
      protocol: TCP
      name: launcher
    {{- end }}
  selector:
    {{- include "picoclaw.selectorLabels" . | nindent 4 }}
