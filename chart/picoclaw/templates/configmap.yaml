apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "picoclaw.fullname" . }}-config
  labels:
    {{- include "picoclaw.labels" . | nindent 4 }}
data:
  config.json: |
    {{- $config := dict }}
    {{- $agents := deepCopy .Values.config.agents }}
    {{- if .Values.agentFiles }}
    {{- $picoHome := include "picoclaw.picoHome" . }}
    {{- $newList := list }}
    {{- range $agents.list }}
    {{- $agent := deepCopy . }}
    {{- if and .id (hasKey $.Values.agentFiles .id) (not .workspace) }}
    {{- $_ := set $agent "workspace" (printf "%s/workspace/%s" $picoHome .id) }}
    {{- end }}
    {{- $newList = append $newList $agent }}
    {{- end }}
    {{- $_ := set $agents "list" $newList }}
    {{- end }}
    {{- $_ := set $config "agents" $agents }}
    {{- if .Values.config.model_list }}
    {{- $_ := set $config "model_list" .Values.config.model_list }}
    {{- end }}
    {{- if .Values.config.bindings }}
    {{- $_ := set $config "bindings" .Values.config.bindings }}
    {{- end }}
    {{- if .Values.config.channels }}
    {{- $_ := set $config "channels" .Values.config.channels }}
    {{- end }}
    {{- if .Values.config.session }}
    {{- $_ := set $config "session" .Values.config.session }}
    {{- end }}
    {{- if .Values.config.gateway }}
    {{- $_ := set $config "gateway" .Values.config.gateway }}
    {{- end }}
    {{- if .Values.config.tools }}
    {{- $_ := set $config "tools" .Values.config.tools }}
    {{- end }}
    {{- if .Values.config.heartbeat }}
    {{- $_ := set $config "heartbeat" .Values.config.heartbeat }}
    {{- end }}
    {{- if .Values.config.extraConfig }}
    {{- range $k, $v := .Values.config.extraConfig }}
    {{- $_ := set $config $k $v }}
    {{- end }}
    {{- end }}
    {{ $config | toJson | nindent 4 }}
